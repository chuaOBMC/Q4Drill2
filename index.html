<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4Drill2</title>
</head>
<style>
    body{
        background-image: url('https://pia.gov.ph/wp-content/uploads/2025/10/pagasa-habagat-southwest-monsoon-rainy-season-floods-rains.png');
        text-align: center;
    }
</style>
<body>
    <div>
    <h1>Heat Index Checker</h1>
<input type="text" class="form-control" id="temperature" placeholder="type here....">
<input type="text" class="form-control" id="humidity" placeholder="type here....">
<br>
<button class="btn btn-info" onclick="checkHeat()">Check
</button>
</div>

<script>
function checkHeat(){
var temperature = parseFloat(document.getElementById('temperature').value);
var humidity = parseFloat(document.getElementById('humidity').value);
var HeatIndex = temperature + (0.33 * humidity) - 4;
var message = "";

switch(true){
case (HeatIndex <= 27):
message = "Status: Comfortable/Cool"; break;

case (HeatIndex <= 32):
message = "Status: Warm"; break;

case (HeatIndex <= 37):
message = "Status: Hot"; break;

case (HeatIndex <= 41):
message = "Status: Very Hot/Caution"; break;

case (HeatIndex >= 42):
message = "Status: Extreme Heat/Danger"; break;
}
alert("Heat Index: " + HeatIndex.toFixed(1) + "\nStatus: " + message);

}
</script>

</body>
</html>
