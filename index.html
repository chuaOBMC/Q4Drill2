<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4Drill2</title>
</head>
<style>
    html, body {
        height: 100%;
        margin: 0;
    }

    body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background-image: url('https://pia.gov.ph/wp-content/uploads/2025/10/pagasa-habagat-southwest-monsoon-rainy-season-floods-rains.png');
        background-repeat: no-repeat;
        background-position: center;
        background-size: cover;
        text-align: center;
        font-family: Arial, sans-serif;
    }

    .container {
        width: min(420px, 95%);
        background: rgba(255, 255, 255, 0.9);
        padding: 2rem;
        border-radius: 1rem;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.2);
    }

    h1 {
        font-size: 2.5rem;
        margin-bottom: 1.25rem;
    }

    .form-control {
        width: 100%;
        font-size: 1.1rem;
        padding: 0.9rem 1rem;
        margin: 0.5rem 0;
        border: 1px solid #ccc;
        border-radius: 0.75rem;
        box-sizing: border-box;
    }

    .btn {
        font-size: 1.1rem;
        padding: 0.9rem 1.3rem;
        border: none;
        border-radius: 0.75rem;
        cursor: pointer;
    }

    .btn-info {
        background-color: #17a2b8;
        color: white;
    }
</style>
<body>
    <div class="container">
    <h1>Heat Index Checker</h1>
<input type="text" class="form-control" id="temperature" placeholder="type here....">
<input type="text" class="form-control" id="humidity" placeholder="type here....">
<br>
<button class="btn btn-info" onclick="checkHeat()">Check</button>
</div>

<script>
function checkHeat(){
var temperature = parseFloat(document.getElementById('temperature').value);
var humidity = parseFloat(document.getElementById('humidity').value);
var HeatIndex = temperature + (0.33 * humidity) - 4;
var message = "";

switch(true){
case (HeatIndex <= 27):
message = "Status: Comfortable/Cool"; break;

case (HeatIndex <= 32):
message = "Status: Warm"; break;

case (HeatIndex <= 37):
message = "Status: Hot"; break;

case (HeatIndex <= 41):
message = "Status: Very Hot/Caution"; break;

case (HeatIndex >= 42):
message = "Status: Extreme Heat/Danger"; break;
}
alert("Heat Index: " + HeatIndex.toFixed(1) + "\nStatus: " + message);

}
</script>

</body>
</html>
